name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  worker:
    name: worker (build + syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check server JS
        run: find worker/server -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Seed apps.sql is up to date
        run: |
          cd worker
          node seeds/build.mjs
          git diff --exit-code seeds/apps.sql

      - name: Build UI
        run: |
          cd worker/ui
          npm ci
          npm run build
