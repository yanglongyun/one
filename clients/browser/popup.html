<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  /* 暖纸 / 墨夜 —— 与主站同一套视觉语言:平面、细边框、实心品牌蓝 */
  * { box-sizing: border-box; }
  :root {
    --bg: #faf9f7; --panel: #ffffff; --field: #ffffff;
    --line: rgba(62, 58, 44, .14); --line-soft: rgba(62, 58, 44, .08);
    --ink: #35342e; --muted: #8a887f; --faint: #b5b3aa;
    --accent: #3b9bf5; --accent-deep: #2b86e4; --ring: rgba(59, 155, 245, .18);
    --good: #1fa66a; --bad: #e05561; --hover: rgba(62, 58, 44, .06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #212121; --panel: #2b2b2b; --field: #2b2b2b;
      --line: rgba(255, 255, 255, .12); --line-soft: rgba(255, 255, 255, .07);
      --ink: #ececec; --muted: #908f8a; --faint: #6b6a65;
      --accent: #5ba4f0; --accent-deep: #7ab5f5; --ring: rgba(91, 164, 240, .28);
      --good: #43c98c; --bad: #ef827c; --hover: rgba(255, 255, 255, .06);
    }
  }
  body {
    width: 320px; margin: 0; color: var(--ink);
    font: 13px -apple-system, "PingFang SC", system-ui, sans-serif;
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { padding: 16px; }
  .head { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
  .logo {
    width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; flex-shrink: 0;
    background: var(--accent);
  }
  .logo svg { width: 22px; height: 22px; display: block; }
  #status.bad { color: var(--bad); }
  .brand { flex: 1; min-width: 0; }
  .brand b { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .ver {
    font-family: ui-monospace, "SF Mono", monospace; font-size: 10.5px; color: var(--muted);
    background: var(--hover); border: 1px solid var(--line-soft); border-radius: 999px; padding: 3px 8px;
  }
  .status {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    background: var(--panel); border: 1px solid var(--line-soft); border-radius: 10px; padding: 9px 12px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex-shrink: 0; transition: .2s; }
  #status { color: var(--muted); font-size: 12px; }
  .connected .dot { background: var(--good); animation: pulse 2.2s infinite; }
  .connected #status { color: var(--ink); }
  @keyframes pulse { 50% { opacity: .45; } }
  input {
    width: 100%; background: var(--field); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; color: var(--ink); font-size: 12.5px; outline: none; transition: .15s;
    font-family: ui-monospace, "SF Mono", monospace;
  }
  input::placeholder { color: var(--faint); font-family: -apple-system, system-ui, sans-serif; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
  #toggle {
    width: 100%; margin-top: 12px; border: 0; border-radius: 10px; padding: 10px;
    font-weight: 600; font-size: 13px; letter-spacing: .3px; color: #fff; cursor: pointer;
    background: var(--accent); transition: background .15s, color .15s;
  }
  #toggle:hover { background: var(--accent-deep); }
  #toggle:active { transform: scale(.99); }
  #toggle.on {
    background: var(--panel); color: var(--muted); border: 1px solid var(--line);
  }
  #toggle.on:hover { background: var(--hover); color: var(--ink); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="logo">
        <svg viewBox="0 0 1024 1024" fill="#fff" aria-hidden="true"><circle cx="466" cy="466" r="142"/><circle cx="356" cy="524" r="96"/><circle cx="512" cy="418" r="88"/><circle cx="586" cy="504" r="110"/><circle cx="664" cy="546" r="78"/><circle cx="446" cy="596" r="86"/><circle cx="560" cy="606" r="76"/></svg>
      </div>
      <div class="brand"><b>one</b></div>
      <span id="ver" class="ver">v0.2.0</span>
    </div>
    <div class="status"><span id="dot" class="dot"></span><span id="status">…</span></div>
    <input id="worker" placeholder="主域名 https://your-worker.example.com" spellcheck="false" autocapitalize="off" />
    <input id="password" type="password" placeholder="访问密码" spellcheck="false" autocapitalize="off" style="margin-top:8px" />
    <input id="name" placeholder="设备名(唯一,如 chrome)" spellcheck="false" autocapitalize="off" style="margin-top:8px" />
    <button id="toggle">连接</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
